<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Detail · Myinstants</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <!-- Same sidebar -->
    <aside class="sidebar">
      <!-- ... sidebar code ... -->
    </aside>

    <main class="main-content">
      <!-- Back button -->
      <button class="back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Back
      </button>

      <!-- Sound detail container -->
      <div id="soundDetailContainer">
        <!-- Will be populated by JavaScript -->
      </div>
    </main>
  </div>

  <audio id="audioPlayer" style="display: none;"></audio>

  <script src="js/data.js"></script>
  <script src="js/player.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const soundId = urlParams.get('id');
    
    document.addEventListener('DOMContentLoaded', () => {
      const sound = SoundData.getSoundById(soundId);
      if (!sound) {
        window.location.href = 'index.html';
        return;
      }
      
      document.title = `${sound.name} · Myinstants`;
      
      document.getElementById('soundDetailContainer').innerHTML = `
        <div class="sound-detail">
          <div class="sound-hero">
            <div class="sound-icon-large" onclick="playSoundById('${sound.id}')">
              <i class="fas fa-play fa-3x"></i>
            </div>
            <div class="sound-info-large">
              <h1>${sound.name}</h1>
              <div class="sound-meta">
                <span class="category-badge">
                  <i class="fas ${getCategoryIcon(sound.category)}"></i>
                  ${sound.category}
                </span>
                <span><i class="fas fa-user"></i> ${sound.uploader}</span>
                <span><i class="fas fa-calendar"></i> ${sound.uploadDate}</span>
              </div>
            </div>
          </div>
          
          <div class="sound-actions">
            <button class="action-btn primary" onclick="playSoundById('${sound.id}')">
              <i class="fas fa-play"></i> Play Sound
            </button>
            <button class="action-btn" onclick="downloadSound('${sound.id}')">
              <i class="fas fa-download"></i> Download
            </button>
            <button class="action-btn" onclick="toggleFavorite('${sound.id}')">
              <i class="fas fa-heart"></i> Favorite
            </button>
            <button class="action-btn">
              <i class="fas fa-share"></i> Share
            </button>
          </div>
          
          <div class="sound-stats-detailed">
            <div class="stat-card">
              <i class="fas fa-play-circle"></i>
              <div>
                <span class="stat-value">${formatNumber(sound.plays)}</span>
                <span class="stat-label">Plays</span>
              </div>
            </div>
            <div class="stat-card">
              <i class="fas fa-heart"></i>
              <div>
                <span class="stat-value">${formatNumber(sound.likes)}</span>
                <span class="stat-label">Favorites</span>
              </div>
            </div>
            <div class="stat-card">
              <i class="fas fa-download"></i>
              <div>
                <span class="stat-value">${formatNumber(sound.downloads)}</span>
                <span class="stat-label">Downloads</span>
              </div>
            </div>
          </div>
          
          <div class="sound-description">
            <h3>Description</h3>
            <p>${sound.description || 'No description provided.'}</p>
          </div>
          
          <div class="comments-section">
            <h3>Comments (${sound.comments?.length || 0})</h3>
            <div class="comment-form">
              <textarea placeholder="Add a comment..."></textarea>
              <button>Post Comment</button>
            </div>
            <div class="comments-list">
              ${renderComments(sound.comments)}
            </div>
          </div>
          
          <div class="related-sounds">
            <h3>Related Sounds</h3>
            <div class="sound-grid-mini">
              ${renderRelatedSounds(sound.related)}
            </div>
          </div>
        </div>
      `;
    });
    
    function renderComments(comments) {
      if (!comments) return '<p>No comments yet.</p>';
      return comments.map(c => `
        <div class="comment">
          <img src="${c.avatar}" class="comment-avatar">
          <div class="comment-content">
            <div class="comment-header">
              <strong>${c.user}</strong>
              <span>${c.date}</span>
            </div>
            <p>${c.text}</p>
          </div>
        </div>
      `).join('');
    }
    
    function renderRelatedSounds(sounds) {
      if (!sounds) return '';
      return sounds.map(s => `
        <a href="sound.html?id=${s.id}" class="sound-card-mini">
          <div class="sound-icon-small">
            <i class="fas ${getIconForSound(s.name)}"></i>
          </div>
          <span>${s.name}</span>
        </a>
      `).join('');
    }
  </script>
</body>
</html>
