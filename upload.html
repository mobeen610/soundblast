<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Sound · Myinstants</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar"><!-- same sidebar --></aside>
    
    <main class="main-content">
      <div class="upload-container">
        <h1><i class="fas fa-cloud-upload-alt"></i> Upload New Sound</h1>
        
        <form class="upload-form" id="uploadForm">
          <div class="upload-area" id="dropZone">
            <i class="fas fa-cloud-upload-alt fa-3x"></i>
            <p>Drag & drop your audio file here</p>
            <p class="text-muted">or</p>
            <button type="button" class="btn-secondary" onclick="document.getElementById('fileInput').click()">
              Browse Files
            </button>
            <input type="file" id="fileInput" accept="audio/*" style="display: none;">
            <p class="file-hint">MP3, WAV, OGG up to 10MB</p>
          </div>
          
          <div class="form-group">
            <label>Sound Name *</label>
            <input type="text" required placeholder="e.g., Vine Boom Sound">
          </div>
          
          <div class="form-group">
            <label>Category *</label>
            <select required>
              <option value="">Select category</option>
              <option>Memes</option>
              <option>Games</option>
              <option>Movies</option>
              <option>Music</option>
              <option>Reactions</option>
              <option>Sound Effects</option>
              <option>Viral</option>
              <option>Whatsapp Audios</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Description</label>
            <textarea rows="4" placeholder="Describe your sound..."></textarea>
          </div>
          
          <div class="form-group">
            <label>Tags</label>
            <input type="text" placeholder="funny, meme, viral (comma separated)">
          </div>
          
          <div class="form-group">
            <label>
              <input type="checkbox"> I confirm I have rights to upload this sound
            </label>
          </div>
          
          <button type="submit" class="btn-primary btn-large">
            <i class="fas fa-upload"></i> Upload Sound
          </button>
        </form>
      </div>
    </main>
  </div>
  
  <script>
    // Drag & drop functionality
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      handleFiles(files);
    });
    
    function handleFiles(files) {
      if (files.length > 0) {
        // Process file upload
        console.log('File selected:', files[0].name);
      }
    }
  </script>
</body>
</html>
