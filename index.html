<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myinstants - Trending Funny Sounds of Pakistan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e1e2a; }
    
    /* TOP MENU BAR - Exactly like Myinstants */
    .top-menu {
      background: white;
      border-bottom: 1px solid #e8ecf3;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo i { color: #2563eb; }
    
    .menu-items {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    
    .menu-item {
      color: #4a4a6a;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .menu-item i { color: #7c7c9e; font-size: 0.9rem; }
    .menu-item:hover { color: #2563eb; }
    .menu-item.active { color: #2563eb; }
    
    .user-section {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    
    .upload-btn {
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .install-btn {
      background: white;
      color: #1a1a2e;
      border: 1px solid #e8ecf3;
      border-radius: 40px;
      padding: 8px 16px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    /* MAIN CONTENT */
    .main-content { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
    
    .breadcrumb { color: #7c7c9e; font-size: 0.9rem; margin-bottom: 8px; }
    .page-title { font-size: 2rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .page-title i { color: #f59e0b; }
    
    /* CATEGORY CHIPS */
    .category-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 16px;
    }
    
    .category-chip {
      background: white;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #3d3d60;
      border: 1px solid #e8ecf3;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .category-chip i { color: #7c7c9e; font-size: 0.75rem; }
    .category-chip:hover { background: #f0f3fd; border-color: #2563eb; }
    
    /* SOUND GRID - Myinstants exact layout */
    .sound-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    
    .sound-card {
      background: white;
      border-radius: 12px;
      padding: 16px 8px 12px;
      border: 1px solid #eef0f5;
      text-align: center;
      transition: all 0.1s;
    }
    
    .sound-card:hover {
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
      border-color: #d0d9f0;
    }
    
    .sound-icon {
      width: 48px;
      height: 48px;
      background: #eef3ff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      color: #2563eb;
      font-size: 1.4rem;
    }
    
    .sound-name {
      font-weight: 700;
      font-size: 0.8rem;
      line-height: 1.3;
      margin-bottom: 10px;
      word-break: break-word;
      color: #1e1e32;
      min-height: 36px;
    }
    
    /* EXACT MYINSTANTS BUTTON */
    .play-btn {
      width: 38px;
      height: 38px;
      background: #3b82f6;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
      transition: all 0.15s;
    }
    
    .play-btn i { color: white; font-size: 0.9rem; }
    .play-btn:hover { background: #2563eb; transform: scale(1.05); }
    .play-btn.playing { background: #10b981; }
    
    .sound-meta {
      font-size: 0.65rem;
      color: #8a8aa8;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <!-- TOP MENU - Exactly like Myinstants -->
  <div class="top-menu">
    <div class="logo">
      <i class="fas fa-bolt"></i> Myinstants
    </div>
    
    <div class="menu-items">
      <span class="menu-item active"><i class="fas fa-home"></i> Home</span>
      <span class="menu-item"><i class="fas fa-clock"></i> Just added</span>
      <span class="menu-item"><i class="fas fa-th-large"></i> Categories</span>
      <span class="menu-item"><i class="fas fa-dragon"></i> Anime</span>
      <span class="menu-item"><i class="fas fa-gamepad"></i> Games</span>
      <span class="menu-item"><i class="fas fa-laugh-squint"></i> Memes</span>
      <span class="menu-item"><i class="fas fa-film"></i> Movies</span>
      <span class="menu-item"><i class="fas fa-music"></i> Music</span>
      <span class="menu-item"><i class="fas fa-fire"></i> Viral</span>
    </div>
    
    <div class="user-section">
      <span class="install-btn"><i class="fas fa-download"></i> Install app</span>
      <span class="upload-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</span>
      <i class="fas fa-user-circle" style="font-size: 1.5rem; color: #4a4a6e; cursor: pointer;"></i>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="breadcrumb">
      <span>Myinstants</span> <i class="fas fa-chevron-right" style="font-size: 10px; margin: 0 6px;"></i>
      <span style="font-weight: 500;">Trending in Pakistan</span>
    </div>
    
    <div class="page-title">
      <i class="fas fa-fire"></i> Trending in Pakistan 🇵🇰
    </div>
    
    <div class="category-row">
      <span class="category-chip"><i class="fas fa-gamepad"></i> Games</span>
      <span class="category-chip"><i class="fas fa-laugh-squint"></i> Memes</span>
      <span class="category-chip"><i class="fas fa-film"></i> Movies</span>
      <span class="category-chip"><i class="fas fa-music"></i> Music</span>
      <span class="category-chip"><i class="fas fa-users"></i> Politics</span>
      <span class="category-chip"><i class="fas fa-hand-peace"></i> Pranks</span>
      <span class="category-chip"><i class="fas fa-surprise"></i> Reactions</span>
      <span class="category-chip"><i class="fas fa-volume-up"></i> Sound Effects</span>
      <span class="category-chip"><i class="fas fa-futbol"></i> Sports</span>
      <span class="category-chip"><i class="fas fa-tv"></i> Television</span>
      <span class="category-chip"><i class="fab fa-tiktok"></i> Tiktok</span>
      <span class="category-chip"><i class="fab fa-whatsapp"></i> WhatsApp</span>
    </div>

    <!-- SOUND GRID -->
    <div class="sound-grid" id="soundGrid"></div>
  </div>

  <script>
    const sounds = [
      "FAHHHHHHHHHHHHHH", "FAAAH", "Chicken on tree screaming", "VINE BOOM SOUND",
      "anime ahh", "GopGopGop", "Fart", "Tum Dum Tedau", "Fahhh",
      "Among Us role reveal sound", "Anime Wow", "Sad Violin", "Bone Crack",
      "Shocked sound", "Tuco: GET OUT", "HAha funny laugh", "rizz sound effect",
      "spiderman meme song", "Dexter meme", "CID LE MDC", "Chalo", "Acha ji"
    ];

    let currentButton = null;
    let audioContext = null;
    let currentOsc = null;

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    function playSound(soundName, button) {
      initAudio();
      if (!audioContext) return;
      
      if (currentOsc) { try { currentOsc.stop(); } catch(e) {} }
      if (currentButton) {
        currentButton.classList.remove('playing');
        currentButton.innerHTML = '<i class="fas fa-play"></i>';
      }
      
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      let hash = 0;
      for (let i = 0; i < soundName.length; i++) {
        hash = ((hash << 5) - hash) + soundName.charCodeAt(i);
      }
      
      osc.frequency.value = 350 + Math.abs(hash % 450);
      osc.type = ['triangle', 'sawtooth', 'square'][Math.abs(hash) % 3];
      
      gain.gain.setValueAtTime(0.15, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.35);
      
      osc.connect(gain); gain.connect(audioContext.destination);
      osc.start(); currentOsc = osc; osc.stop(audioContext.currentTime + 0.35);
      
      button.classList.add('playing');
      button.innerHTML = '<i class="fas fa-pause"></i>';
      currentButton = button;
      
      osc.onended = () => {
        button.classList.remove('playing');
        button.innerHTML = '<i class="fas fa-play"></i>';
        currentButton = null; currentOsc = null;
      };
    }

    function renderGrid() {
      const grid = document.getElementById('soundGrid');
      let html = '';
      
      sounds.forEach((name) => {
        html += `
          <div class="sound-card">
            <div class="sound-icon"><i class="fas fa-volume-up"></i></div>
            <div class="sound-name">${name}</div>
            <button class="play-btn" data-name="${name.replace(/"/g, '&quot;')}">
              <i class="fas fa-play"></i>
            </button>
            <div class="sound-meta">
              <span><i class="far fa-play-circle"></i> ${Math.floor(Math.random()*5000)+500}</span>
              <span><i class="far fa-heart"></i> ${Math.floor(Math.random()*300)+20}</span>
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html;
      
      document.querySelectorAll('.play-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          playSound(btn.dataset.name, btn);
        });
      });
    }

    document.body.addEventListener('click', () => { initAudio(); }, { once: true });
    renderGrid();
  </script>
</body>
</html>
