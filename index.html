<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myinstants - Trending Funny Sounds of Pakistan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e1e2a; }
    
    /* TOP MENU */
    .top-menu { background: white; border-bottom: 1px solid #e8ecf3; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }
    .logo i { color: #2563eb; }
    .menu-items { display: flex; gap: 24px; }
    .menu-item { color: #4a4a6a; font-weight: 500; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .menu-item i { color: #7c7c9e; font-size: 0.9rem; }
    .menu-item:hover { color: #2563eb; }
    .menu-item.active { color: #2563eb; }
    .user-section { display: flex; gap: 16px; align-items: center; }
    .upload-btn { background: #1a1a2e; color: white; border: none; border-radius: 40px; padding: 8px 16px; font-weight: 500; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .install-btn { background: white; color: #1a1a2e; border: 1px solid #e8ecf3; border-radius: 40px; padding: 8px 16px; font-weight: 500; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    
    /* MAIN CONTENT */
    .main-content { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
    .breadcrumb { color: #7c7c9e; font-size: 0.9rem; margin-bottom: 8px; }
    .page-title { font-size: 2rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .page-title i { color: #f59e0b; }
    
    /* CATEGORY CHIPS */
    .category-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; border-bottom: 1px solid #e2e8f0; padding-bottom: 16px; }
    .category-chip { background: white; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; color: #3d3d60; border: 1px solid #e8ecf3; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .category-chip i { color: #7c7c9e; font-size: 0.75rem; }
    
    /* SOUND GRID */
    .sound-grid { display: flex; flex-direction: column; gap: 2px; background: #e8ecf3; border: 1px solid #e8ecf3; border-radius: 8px; overflow: hidden; }
    
    /* EXACT MYINSTANTS CARD LAYOUT */
    .sound-card {
      background: white;
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #eef0f5;
      transition: background 0.1s;
    }
    
    .sound-card:last-child { border-bottom: none; }
    .sound-card:hover { background: #f8faff; }
    
    /* Play button on left */
    .play-btn {
      width: 36px;
      height: 36px;
      background: #3b82f6;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    
    .play-btn i { color: white; font-size: 0.85rem; }
    .play-btn:hover { background: #2563eb; transform: scale(1.05); }
    .play-btn.playing { background: #10b981; }
    
    /* Sound name - can wrap to 2 lines */
    .sound-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e1e32;
      flex: 1;
      line-height: 1.3;
      padding-right: 16px;
    }
    
    /* Stats on right */
    .sound-stats {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #8a8aa8;
      font-size: 0.8rem;
      min-width: 55px;
    }
    
    .stat-item i { color: #b0b0ce; font-size: 0.9rem; }
    .stat-item .fa-heart { color: #ef4444; }
    
    /* More options dots */
    .more-options {
      color: #b0b0ce;
      margin-left: 8px;
      cursor: pointer;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <!-- TOP MENU -->
  <div class="top-menu">
    <div class="logo"><i class="fas fa-bolt"></i> Myinstants</div>
    <div class="menu-items">
      <span class="menu-item active"><i class="fas fa-home"></i> Home</span>
      <span class="menu-item"><i class="fas fa-clock"></i> Just added</span>
      <span class="menu-item"><i class="fas fa-th-large"></i> Categories</span>
      <span class="menu-item"><i class="fas fa-dragon"></i> Anime</span>
      <span class="menu-item"><i class="fas fa-gamepad"></i> Games</span>
      <span class="menu-item"><i class="fas fa-laugh-squint"></i> Memes</span>
      <span class="menu-item"><i class="fas fa-fire"></i> Viral</span>
    </div>
    <div class="user-section">
      <span class="install-btn"><i class="fas fa-download"></i> Install app</span>
      <span class="upload-btn"><i class="fas fa-cloud-upload-alt"></i> Upload</span>
      <i class="fas fa-user-circle" style="font-size: 1.5rem; color: #4a4a6e; cursor: pointer;"></i>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="breadcrumb">
      <span>Myinstants</span> <i class="fas fa-chevron-right" style="font-size: 10px; margin: 0 6px;"></i>
      <span style="font-weight: 500;">Trending in Pakistan</span>
    </div>
    
    <div class="page-title"><i class="fas fa-fire"></i> Trending in Pakistan 🇵🇰</div>
    
    <div class="category-row">
      <span class="category-chip"><i class="fas fa-gamepad"></i> Games</span>
      <span class="category-chip"><i class="fas fa-laugh-squint"></i> Memes</span>
      <span class="category-chip"><i class="fas fa-film"></i> Movies</span>
      <span class="category-chip"><i class="fas fa-music"></i> Music</span>
      <span class="category-chip"><i class="fas fa-users"></i> Politics</span>
      <span class="category-chip"><i class="fas fa-hand-peace"></i> Pranks</span>
      <span class="category-chip"><i class="fas fa-surprise"></i> Reactions</span>
      <span class="category-chip"><i class="fas fa-volume-up"></i> Sound Effects</span>
      <span class="category-chip"><i class="fas fa-futbol"></i> Sports</span>
      <span class="category-chip"><i class="fas fa-tv"></i> Television</span>
      <span class="category-chip"><i class="fab fa-tiktok"></i> Tiktok</span>
      <span class="category-chip"><i class="fab fa-whatsapp"></i> WhatsApp</span>
    </div>

    <!-- SOUND LIST - Exact Myinstants layout -->
    <div class="sound-grid" id="soundGrid"></div>
  </div>

  <script>
    const sounds = [
      "FAHHHHHHHHHHHHHH", "FAAAH", "Chicken on tree screaming", "VINE BOOM SOUND",
      "anime ahh", "GopGopGop", "Fart", "Tum Dum Tedau", "Fahhh",
      "Among Us role reveal sound", "Anime Wow", "Mka ladle meow gop.",
      "Matlab wo alag hi level ka banda tha", "Bhosdike madarchod been k loray - roadies",
      "CID LE MDC", "Chalo", "romanceeeeeeeeeeeeee", "I've Got This FAAAAAAAAAHHHHH",
      "Sad Violin (the meme one)", "Dexter meme", "Lund pakad ke tarazu ki tarah cid",
      "teri gand mari", "Ab tu Gaya beta ab dekh tu (puneet", "sparrowusa24 ouch",
      "rizz sound effect", "Acha ji aisa hai kya", "Bone Crack", "spiderman meme song",
      "dun dun dunnnnnnnn", "HAha funny laugh", "Shocked sound", "Tuco: GET OUT"
    ];

    let currentButton = null;
    let audioContext = null;
    let currentOsc = null;

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    function playSound(soundName, button) {
      initAudio();
      if (!audioContext) return;
      
      if (currentOsc) { try { currentOsc.stop(); } catch(e) {} }
      if (currentButton) {
        currentButton.classList.remove('playing');
        currentButton.innerHTML = '<i class="fas fa-play"></i>';
      }
      
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      let hash = 0;
      for (let i = 0; i < soundName.length; i++) {
        hash = ((hash << 5) - hash) + soundName.charCodeAt(i);
      }
      
      osc.frequency.value = 350 + Math.abs(hash % 450);
      osc.type = ['triangle', 'sawtooth', 'square'][Math.abs(hash) % 3];
      
      gain.gain.setValueAtTime(0.15, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.4);
      
      osc.connect(gain); gain.connect(audioContext.destination);
      osc.start(); currentOsc = osc; osc.stop(audioContext.currentTime + 0.4);
      
      button.classList.add('playing');
      button.innerHTML = '<i class="fas fa-pause"></i>';
      currentButton = button;
      
      osc.onended = () => {
        button.classList.remove('playing');
        button.innerHTML = '<i class="fas fa-play"></i>';
        currentButton = null; currentOsc = null;
      };
    }

    function renderGrid() {
      const grid = document.getElementById('soundGrid');
      let html = '';
      
      sounds.forEach((name) => {
        const plays = Math.floor(Math.random() * 50000) + 1000;
        const likes = Math.floor(Math.random() * 5000) + 100;
        
        html += `
          <div class="sound-card">
            <button class="play-btn" data-name="${name.replace(/"/g, '&quot;')}">
              <i class="fas fa-play"></i>
            </button>
            <div class="sound-name">${name}</div>
            <div class="sound-stats">
              <span class="stat-item"><i class="fas fa-play"></i> ${plays >= 1000 ? (plays/1000).toFixed(1) + 'k' : plays}</span>
              <span class="stat-item"><i class="fas fa-heart"></i> ${likes >= 1000 ? (likes/1000).toFixed(0) + 'k' : likes}</span>
            </div>
            <span class="more-options">⋯</span>
          </div>
        `;
      });
      
      grid.innerHTML = html;
      
      document.querySelectorAll('.play-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          playSound(btn.dataset.name, btn);
        });
      });
    }

    document.body.addEventListener('click', () => { initAudio(); }, { once: true });
    renderGrid();
  </script>
</body>
</html>
