<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundBlast 🔊 Trending Sounds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f8faff; }
    
    .sound-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      padding: 24px;
    }
    
    .sound-button {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    
    .sound-button:hover {
      background: #ff6b35;
      color: white;
      border-color: #ff6b35;
      transform: scale(1.02);
    }
    
    .sound-button i {
      margin-right: 8px;
      font-size: 1.2rem;
    }
    
    .playing {
      background: #004e89;
      color: white;
      border-color: #004e89;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
  </style>
</head>
<body>
  <h1 style="padding: 24px;">🔊 SoundBlast - Trending Sounds</h1>
  
  <!-- SOUND BUTTONS - Directly in HTML -->
  <div class="sound-grid">
    <button class="sound-button" onclick="playSound('FAHHHHHHHHHHHHHH')">
      <i class="fas fa-volume-up"></i> FAHHHHHHHHHHHHHH
    </button>
    <button class="sound-button" onclick="playSound('FAAAH')">
      <i class="fas fa-volume-up"></i> FAAAH
    </button>
    <button class="sound-button" onclick="playSound('Chicken on tree screaming')">
      <i class="fas fa-volume-up"></i> Chicken on tree screaming
    </button>
    <button class="sound-button" onclick="playSound('VINE BOOM SOUND')">
      <i class="fas fa-volume-up"></i> VINE BOOM SOUND
    </button>
    <button class="sound-button" onclick="playSound('anime ahh')">
      <i class="fas fa-volume-up"></i> anime ahh
    </button>
    <button class="sound-button" onclick="playSound('GopGopGop')">
      <i class="fas fa-volume-up"></i> GopGopGop
    </button>
    <button class="sound-button" onclick="playSound('Fart')">
      <i class="fas fa-volume-up"></i> Fart
    </button>
    <button class="sound-button" onclick="playSound('Anime Wow')">
      <i class="fas fa-volume-up"></i> Anime Wow
    </button>
    <button class="sound-button" onclick="playSound('Tum Dum Tedau')">
      <i class="fas fa-volume-up"></i> Tum Dum Tedau
    </button>
    <button class="sound-button" onclick="playSound('Among Us role reveal sound')">
      <i class="fas fa-volume-up"></i> Among Us role reveal
    </button>
    <button class="sound-button" onclick="playSound('Sad Violin (the meme one)')">
      <i class="fas fa-volume-up"></i> Sad Violin
    </button>
    <button class="sound-button" onclick="playSound('Bone Crack')">
      <i class="fas fa-volume-up"></i> Bone Crack
    </button>
    <button class="sound-button" onclick="playSound('SpongeBob Fail')">
      <i class="fas fa-volume-up"></i> SpongeBob Fail
    </button>
    <button class="sound-button" onclick="playSound('Shocked sound')">
      <i class="fas fa-volume-up"></i> Shocked sound
    </button>
    <button class="sound-button" onclick="playSound('Tuco: GET OUT')">
      <i class="fas fa-volume-up"></i> Tuco: GET OUT
    </button>
    <button class="sound-button" onclick="playSound('HAha funny laugh')">
      <i class="fas fa-volume-up"></i> HAha funny laugh
    </button>
  </div>

  <script>
    let audioContext = null;
    let currentSource = null;
    let currentButton = null;
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }
    
    function playSound(soundName) {
      initAudio();
      
      // Remove playing class from previous button
      if (currentButton) {
        currentButton.classList.remove('playing');
      }
      
      // Find and highlight current button
      const buttons = document.querySelectorAll('.sound-button');
      for (let btn of buttons) {
        if (btn.textContent.includes(soundName)) {
          btn.classList.add('playing');
          currentButton = btn;
          break;
        }
      }
      
      // Stop any currently playing sound
      if (currentSource) {
        try { currentSource.stop(); } catch(e) {}
      }
      
      // Create unique sound based on name
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      // Generate frequency from sound name
      let hash = 0;
      for (let i = 0; i < soundName.length; i++) {
        hash = ((hash << 5) - hash) + soundName.charCodeAt(i);
      }
      const frequency = 300 + Math.abs(hash % 500);
      
      osc.frequency.value = frequency;
      osc.type = ['sawtooth', 'triangle', 'square'][Math.abs(hash) % 3];
      
      gain.gain.setValueAtTime(0.2, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.4);
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.start();
      currentSource = osc;
      osc.stop(audioContext.currentTime + 0.4);
      
      // Remove playing class after sound ends
      setTimeout(() => {
        if (currentButton) {
          currentButton.classList.remove('playing');
          currentButton = null;
        }
      }, 400);
    }
    
    // Enable audio on first click
    document.addEventListener('click', () => {
      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }, { once: true });
  </script>
</body>
</html>
