<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories · Myinstants</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <!-- Same sidebar as index.html -->
    <aside class="sidebar">
      <!-- ... identical sidebar code ... -->
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="search" placeholder="Search in this category...">
        </div>
        <div class="header-actions">
          <button class="icon-btn"><i class="fas fa-filter"></i> Filter</button>
          <select class="sort-select">
            <option>Trending</option>
            <option>Most recent</option>
            <option>Most played</option>
            <option>Most liked</option>
          </select>
        </div>
      </header>

      <!-- Dynamic breadcrumb -->
      <div class="breadcrumb" id="breadcrumb"></div>

      <!-- Category header -->
      <div class="category-header" id="categoryHeader"></div>

      <!-- Subcategories -->
      <div class="subcategory-nav" id="subcategories"></div>

      <!-- Sound grid -->
      <div class="sound-grid" id="soundGrid"></div>

      <!-- Load more -->
      <div class="load-more">
        <button class="btn-load-more">Load more sounds</button>
      </div>
    </main>
  </div>

  <audio id="audioPlayer" style="display: none;"></audio>

  <script src="js/data.js"></script>
  <script src="js/player.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // Get category from URL
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('cat') || 'memes';
    const filter = urlParams.get('filter');

    document.addEventListener('DOMContentLoaded', () => {
      // Update page title
      const categoryInfo = SoundData.getCategoryInfo(category);
      document.title = `${categoryInfo.name} · Myinstants`;
      
      // Update breadcrumb
      document.getElementById('breadcrumb').innerHTML = `
        <a href="index.html">Myinstants</a>
        <i class="fas fa-chevron-right"></i>
        <a href="category.html">Categories</a>
        <i class="fas fa-chevron-right"></i>
        <span>${categoryInfo.name}</span>
      `;
      
      // Update header
      document.getElementById('categoryHeader').innerHTML = `
        <div class="category-icon">
          <i class="fas ${categoryInfo.icon}"></i>
        </div>
        <div>
          <h1>${categoryInfo.name}</h1>
          <p>${categoryInfo.description}</p>
        </div>
      `;
      
      // Load sounds for this category
      const sounds = SoundData.getSoundsByCategory(category);
      const grid = document.getElementById('soundGrid');
      
      grid.innerHTML = sounds.map((sound, index) => `
        <div class="sound-card" onclick="playSound(${index}, '${category}')">
          <div class="sound-icon">
            <i class="fas ${getIconForSound(sound.name)}"></i>
          </div>
          <div class="sound-info">
            <h3 class="sound-name">${sound.name}</h3>
            <div class="sound-stats">
              <span><i class="fas fa-play"></i> ${formatNumber(sound.plays)}</span>
              <span><i class="fas fa-heart"></i> ${formatNumber(sound.likes)}</span>
            </div>
          </div>
          <a href="sound.html?id=${sound.id}" class="sound-link">
            <i class="fas fa-external-link-alt"></i>
          </a>
        </div>
      `).join('');
      
      // Load subcategories
      if (categoryInfo.subcategories) {
        document.getElementById('subcategories').innerHTML = categoryInfo.subcategories.map(sub => `
          <a href="category.html?cat=${category}&subcat=${sub.id}" class="subcat-chip">
            ${sub.name}
          </a>
        `).join('');
      }
    });
  </script>
</body>
</html>
